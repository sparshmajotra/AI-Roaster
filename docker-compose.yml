services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roastly
      POSTGRES_USER: roastly
      POSTGRES_PASSWORD: roastly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    command: daphne -b 0.0.0.0 -p 8000 roastly.asgi:application
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://roastly:roastly@postgres:5432/roastly
      REDIS_URL: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  celery:
    build:
      context: ./backend
    command: celery -A roastly worker -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://roastly:roastly@postgres:5432/roastly
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
