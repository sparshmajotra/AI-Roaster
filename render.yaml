services:
  - type: static_site
    name: ai-roaster-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: out
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-roaster-api.onrender.com/api/v1

  - type: web
    name: ai-roaster-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && daphne -b 0.0.0.0 -p $PORT roastly.asgi:application
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.vercel\\.app$,^https://.*\\.onrender\\.com$"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.vercel.app,https://*.onrender.com"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: ROASTLY_ENABLE_DEMO_LOGIN
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-roaster-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: ai-roaster-db
    plan: free
